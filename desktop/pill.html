<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexio Glance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..600;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #f5efe8;
    --surface: #fffdfa;
    --border:  #e4ddd4;
    --text:    #1a1612;
    --muted:   #7a7269;
    --accent:  #c35500;
    --accent2: #ff7a18;
    /* Same warm palette as the marketing site's WebGL hero gradient. */
    --gradient-color-1: #ef7040;
    --gradient-color-2: #c2541e;
    --gradient-color-3: #7a3b9e;
    --gradient-color-4: #f0b060;
  }
  html, body {
    width: 100%; height: 100%;
    background: transparent;          /* Electron window is transparent */
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    cursor: default;
  }

  /* The whole UI lives in one rounded shell that morphs between the two
     states. The Electron window resizes to match; CSS handles the polish. */
  .shell {
    position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: flex-end;
  }

  /* ── Collapsed pill ─────────────────────────────────────────────
     A small disc with an animated, rotating conic-gradient — same brand
     colors as the marketing site's WebGL hero (--gradient-color-1..4),
     but plain CSS instead of a WebGL canvas: at 36px, whatamesh's mesh
     shader (built for a wide hero banner) only ever showed a thin slice
     of its pattern, which read as a flat horizontal band rather than a
     blend. A conic-gradient is designed to fill any size convincingly,
     and rotating it is a cheap, GPU-composited transform — no WebGL
     context needed for something this small. Hovering the pill triggers
     the full expand (see the mouseenter listener below) rather than a
     separate cosmetic scale/shadow hover state, so there's no lingering
     "grow slightly" micro-interaction to clash with the real expand
     animation starting at the same time. */
  .pill {
    -webkit-app-region: drag;          /* let users drag the widget */
    position: relative;
    width: 36px; height: 36px;
    margin: 0 auto 4px;
    border-radius: 50%;
    overflow: hidden;                  /* clips the gradient layer into a disc */
    cursor: pointer;
    box-shadow: 0 6px 16px -6px rgba(80,40,0,0.4), 0 1px 4px rgba(0,0,0,0.1);
    /* opacity kept in sync with .panel's 0.42s fade-in above, so the pill
       and panel crossfade together instead of leaving a gap where neither
       is visible; filter (hover feedback) stays snappy/independent. */
    transition: opacity 0.42s cubic-bezier(0.16,1,0.3,1), filter 0.15s ease-out;
  }
  .pill-gradient {
    -webkit-app-region: no-drag;
    position: absolute; inset: 0;
    background: conic-gradient(from 0deg,
      var(--gradient-color-1), var(--gradient-color-4),
      var(--gradient-color-2), var(--gradient-color-3),
      var(--gradient-color-1));
    animation: pillSpin 7s linear infinite;
  }
  @keyframes pillSpin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .pill-gradient { animation: none; }
  }
  .pill:hover { filter: brightness(1.08) saturate(1.1); }

  /* ── Expanded panel ─────────────────────────────────────── */
  /* Content crossfade timed to land alongside the ~480ms smooth window
     grow driven from main-overlay.js (animateBounds), so the pill visibly
     blends into the full app rather than snapping — inspired by the
     reference clip of the redesigned Siri "Search or Ask" bar smoothly
     growing from a small dot into its full pill shape. (Wispr Flow's own
     UI, by contrast, snaps in near-instantly — that was the right model
     for the earlier "trigger this from anywhere" pass, but isn't what's
     being asked for here.) */
  .panel {
    -webkit-app-region: no-drag;
    /* flex:0 + height:0 while collapsed — NOT just opacity:0 — because the
       <webview> inside has its own explicit background (var(--bg)) and,
       being a real embedded guest surface, doesn't reliably respect the
       parent's CSS opacity the way a normal DOM child would. Without a
       zero-size box here, that background painted as a visible card
       filling whatever flex space the panel claimed, even while "hidden". */
    flex: 0 0 0; height: 0; margin: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 20px 60px -16px rgba(80,40,0,0.45);
    display: flex; flex-direction: column;
    overflow: hidden;
    opacity: 0; transform: scale(0.92);
    transition: opacity 0.42s cubic-bezier(0.16,1,0.3,1), transform 0.42s cubic-bezier(0.16,1,0.3,1);
    pointer-events: none;
  }
  .panel-head {
    -webkit-app-region: drag;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .panel-mark { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 7px; }
  .panel-mark em { color: var(--accent); font-style: italic; }
  .panel-tag {
    font-family: 'DM Sans', sans-serif; font-size: 0.62rem; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent);
    background: rgba(195,85,0,0.10); border-radius: 5px; padding: 2px 6px;
  }
  .panel-spacer { flex: 1; }
  .panel-close {
    -webkit-app-region: no-drag;
    width: 26px; height: 26px; border: none; border-radius: 7px;
    background: transparent; color: var(--muted); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-close:hover { background: var(--border); color: var(--text); }
  .panel-body { flex: 1; min-height: 0; display: flex; }
  .panel-body webview { flex: 1; width: 100%; height: 100%; background: var(--bg); }

  /* ── State switching ────────────────────────────────────── */
  /* No `transition` shorthand here on purpose — it would silently override
     the consolidated one on the base .pill rule above (shorthand replaces,
     doesn't merge, across rules of equal specificity). */
  .pill                 { opacity: 1; }
  body.expanded .pill   { opacity: 0; pointer-events: none; height: 0; margin: 0; overflow: hidden; }
  body.expanded .panel  { flex: 1; height: auto; opacity: 1; transform: none; pointer-events: auto; }
</style>
</head>
<body>
  <div class="shell">
    <!-- Collapsed pill (default): a small rotating conic-gradient disc,
         same warm palette as the marketing site's hero. No caption text —
         the explanation lives in the hover tooltip. -->
    <div class="pill" id="pill" title="Click or double-tap ⌘ to open Lexio Glance">
      <div class="pill-gradient"></div>
    </div>

    <!-- Expanded panel -->
    <div class="panel" id="panel">
      <div class="panel-head">
        <span class="panel-mark">Le<em>x</em>io <span class="panel-tag">Glance</span></span>
        <span class="panel-spacer"></span>
        <button class="panel-close" id="close" title="Close (Esc)">✕</button>
      </div>
      <div class="panel-body" id="panel-body">
        <!-- The <webview> itself is created dynamically in JS on first
             expand — see the note by ensureFrame() below for why it can't
             just sit here (even hidden/zero-sized) the way it originally
             did. -->
      </div>
    </div>
  </div>

<script>
  const body       = document.body;
  const pill       = document.getElementById('pill');
  const close      = document.getElementById('close');
  const panelBody  = document.getElementById('panel-body');
  const COMPACT_URL = 'https://lexio.site/compact.html';

  // The <webview> is created here, in JS, on first expand — NOT present
  // in the static HTML at all, not even hidden/zero-sized. Its mere
  // presence in the document (regardless of CSS size/visibility) forced
  // this window's compositing to opaque, defeating `transparent: true`
  // on the BrowserWindow — visible as a solid white box filling the
  // whole window around the small collapsed pill. Deferring creation
  // until the window is already the large expanded size (where opacity
  // doesn't matter) sidesteps the issue entirely.
  let frame; // <webview> element, once created
  let frameLoaded = false;
  let frameReady  = false;

  function ensureFrame() {
    if (frameLoaded) return;
    frameLoaded = true;
    frame = document.createElement('webview');
    frame.setAttribute('partition', 'persist:lexio');
    frame.setAttribute('allowpopups', '');
    frame.addEventListener('dom-ready', () => { frameReady = true; flushPending(); });
    panelBody.appendChild(frame);
    frame.src = COMPACT_URL;
  }

  // ── Phase 2: pipe a captured selection straight into the lookup ──
  // Sets compact.html's paste box and runs its existing analyze() flow —
  // identical to a user pasting text and clicking Analyze themselves.
  let pendingText;   // text captured before the webview finished loading
  function injectAndAnalyze(text) {
    const script = `
      (function() {
        const ta = document.getElementById('paste-area');
        if (ta) ta.value = ${JSON.stringify(text)};
        if (typeof analyze === 'function') analyze();
      })();
    `;
    frame.executeJavaScript(script).catch(() => {});
  }
  function flushPending() {
    if (frameReady && pendingText !== undefined) {
      const t = pendingText; pendingText = undefined;
      injectAndAnalyze(t);
    }
  }

  function expand(text) {
    ensureFrame();
    body.classList.add('expanded');
    if (text) { pendingText = text; flushPending(); }
  }
  function collapse() { body.classList.remove('expanded'); }

  // Hover blends the pill into the full app — a short debounce (80ms)
  // avoids triggering on a quick, incidental mouse pass-over rather than
  // an actual pause on the pill. Click still works too (trackpad taps /
  // accessibility can land as a click without a clean hover first).
  let hoverTimer = null;
  pill.addEventListener('mouseenter', () => {
    hoverTimer = setTimeout(() => window.lexioOverlay?.requestExpand(), 80);
  });
  pill.addEventListener('mouseleave', () => {
    if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
  });
  pill.addEventListener('click', () => window.lexioOverlay?.requestExpand());
  close.addEventListener('click', () => window.lexioOverlay?.requestCollapse());
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') window.lexioOverlay?.requestCollapse();
  });

  // Moving the mouse fully out of the window (not just between the pill and
  // the panel — mouseleave on <body> only fires when the cursor actually
  // crosses the window's own edge) collapses back to the pill, mirroring
  // hover-to-expand. A short debounce (200ms), cancelled on re-entry, stops
  // a momentary dip across the edge — e.g. aiming for the close button —
  // from closing the panel out from under the user.
  let leaveTimer = null;
  document.body.addEventListener('mouseleave', () => {
    leaveTimer = setTimeout(() => window.lexioOverlay?.requestCollapse(), 200);
  });
  document.body.addEventListener('mouseenter', () => {
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
  });

  // Main process drives the actual state (it owns the window size) and,
  // when it captured a selection (Phase 2), passes the text along.
  window.lexioOverlay?.onExpand((payload) => expand(payload?.text));
  window.lexioOverlay?.onCollapse(() => collapse());
</script>
</body>
</html>
