<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexio Glance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..600;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;          /* Electron window is transparent */
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    cursor: default;
  }

  /* The whole UI lives in one rounded shell that morphs between the two
     states. The Electron window resizes to match; CSS handles the polish. */
  .shell {
    position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
  }

  /* ── Morphing Container (Siri-style animation) ── */
  .morph-container {
    -webkit-app-region: no-drag;
    position: relative;
    width: 36px; height: 36px;
    border-radius: 50%;
    margin: 0 auto;
    background: var(--surface);
    box-shadow: 0 4px 12px rgba(194,96,26,0.3);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .morph-container:hover { transform: scale(1.1); box-shadow: 0 6px 16px rgba(194,96,26,0.4); }
  .morph-container:active { transform: scale(0.95); }

  .pill-blobs {
    position: absolute; width: 40px; height: 40px; 
    bottom: -2px; left: 50%; margin-left: -20px;
    background-image:
      radial-gradient(circle, color-mix(in srgb, var(--gradient-color-1) 85%, transparent), transparent 78%),
      radial-gradient(circle, color-mix(in srgb, var(--gradient-color-4) 85%, transparent), transparent 75%),
      radial-gradient(circle, color-mix(in srgb, var(--gradient-color-3) 85%, transparent), transparent 78%),
      radial-gradient(circle, color-mix(in srgb, var(--gradient-color-2) 85%, transparent), transparent 75%);
    background-size: 85% 85%;
    background-repeat: no-repeat;
    background-position: 15% 15%, 80% 25%, 25% 80%, 80% 80%;
    animation: pillBlobDrift 9s ease-in-out infinite;
    opacity: 1;
    transition: opacity 0.3s ease;
  }
  @keyframes pillBlobDrift {
    0%, 100% { background-position: 15% 15%, 80% 25%, 25% 80%, 80% 80%; }
    33%      { background-position: 28%  8%, 70% 38%, 38% 70%, 68% 92%; }
    66%      { background-position:  6% 30%, 90% 12%, 12% 90%, 92% 68%; }
  }
  @media (prefers-reduced-motion: reduce) { .pill-blobs { animation: none; } }
  @keyframes pulseCapture {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.15); filter: brightness(1.4); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .morph-container.capturing .pill-blobs { animation: pulseCapture 0.3s ease-out; }

  /* ── Expanded panel ─────────────────────────────────────── */
  .panel-content {
    -webkit-app-region: no-drag;
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 460px; height: 580px;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.05s ease;
  }
  .panel-head {
    -webkit-app-region: drag;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--gradient-color-4) 0%, var(--gradient-color-1) 40%, var(--gradient-color-3) 100%);
  }
  .panel-mark { font-family: var(--font-display); font-weight: 600; font-size: 1.6rem; display: flex; align-items: baseline; gap: 6px; color: white; }
  .panel-tag { font-family: var(--font-display); font-weight: 600; font-size: 1.6rem; font-style: italic; color: white; }
  .panel-spacer { flex: 1; }
  .panel-close, .panel-pin {
    -webkit-app-region: no-drag;
    width: 26px; height: 26px; border: none; border-radius: 7px;
    background: transparent; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-close:hover, .panel-pin:hover { background: rgba(255,255,255,0.2); color: white; }
  .panel-pin.active { color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
  .panel-pin svg { fill: none; transition: fill 0.15s; }
  .panel-pin.active svg { fill: currentColor; }
  .panel-body { flex: 1; min-height: 0; display: flex; }
  .panel-body webview { flex: 1; width: 100%; height: 100%; background: var(--bg); }

  /* ── State switching ────────────────────────────────────── */
  body.expanded .morph-container {
    width: 100%; height: 100%; margin: 0; border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px -16px rgba(80,40,0,0.45);
    cursor: default; transform: none !important;
  }
  body.expanded .pill-blobs { opacity: 0; }
  body.expanded .panel-content {
    opacity: 1; pointer-events: auto;
    transition: opacity 0.1s ease 0.05s;
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="morph-container" id="pill" title="Click: open panel · Double-tap ⌃: define the word at your pointer">
      <div class="pill-blobs"></div>
      <div class="panel-content" id="panel">
        <div class="panel-head">
          <span class="panel-mark">Lexio <span class="panel-tag">Glance</span></span>
          <span class="panel-spacer"></span>
          <button class="panel-pin" id="pin" title="Keep open (ignore click-away)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.68V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3v4.68a2 2 0 0 1-1.11 1.87l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg>
          </button>
          <button class="panel-close" id="close" title="Close (Esc)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <div class="panel-body" id="panel-body">
        </div>
      </div>
    </div>
  </div>

<script>
  const body       = document.body;
  const pill       = document.getElementById('pill');
  const close      = document.getElementById('close');
  const pinBtn     = document.getElementById('pin');
  const panelBody  = document.getElementById('panel-body');

  // Pin resets on every open — it's a "keep this particular lookup open"
  // affordance, not a sticky setting to remember across sessions.
  let pinned = false;
  function setPinned(v) {
    pinned = v;
    pinBtn.classList.toggle('active', pinned);
    window.lexioOverlay?.setPinned(pinned);
  }
  pinBtn.addEventListener('click', () => setPinned(!pinned));
  const COMPACT_URL = 'https://lexio.site/compact.html';

  // Populated below from main before ensureFrame() is ever called in
  // practice (it only runs on the first real expand, which requires user
  // interaction) — defaults to the shipped default (Control) if that
  // hasn't resolved yet for some reason (bug #17's compact.html half).
  let triggerSymbol = '⌃';

  // The <webview> is created here, in JS, on first expand — NOT present
  // in the static HTML at all, not even hidden/zero-sized. Its mere
  // presence in the document (regardless of CSS size/visibility) forced
  // this window's compositing to opaque, defeating `transparent: true`
  // on the BrowserWindow — visible as a solid white box filling the
  // whole window around the small collapsed pill. Deferring creation
  // until the window is already the large expanded size (where opacity
  // doesn't matter) sidesteps the issue entirely.
  let frame; // <webview> element, once created
  let frameLoaded = false;
  let frameReady  = false;

  function ensureFrame() {
    if (frameLoaded) return;
    frameLoaded = true;
    frame = document.createElement('webview');
    frame.setAttribute('partition', 'persist:lexio');
    frame.setAttribute('allowpopups', '');
    frame.addEventListener('dom-ready', () => { frameReady = true; flushPending(); flushPendingAuth(); });
    // Bridge: compact.html has no preload/nodeIntegration, so it can't reach
    // ipcRenderer directly. Tagged console.log messages are how it asks the
    // host to do things on its behalf — LEXIO_LOOKUP:: reports the actually-
    // defined word plus its definition/context (B11 — lets the Hub's
    // Recent tab render + save an entry without re-billing a lookup),
    // LEXIO_ESCAPE:: asks to collapse the panel (bug #12 — Esc previously
    // only worked when THIS document had focus, not once the user clicked
    // into the lookup panel).
    frame.addEventListener('console-message', (e) => {
      if (!e.message) return;
      if (e.message.startsWith('LEXIO_LOOKUP::')) {
        try {
          const { word, data, context } = JSON.parse(e.message.slice('LEXIO_LOOKUP::'.length));
          if (word) window.lexioOverlay?.reportLookup(word, data, context);
        } catch {}
      } else if (e.message === 'LEXIO_ESCAPE::') {
        window.lexioOverlay?.requestCollapse();
      } else if (e.message === 'LEXIO_SIGNIN::') {
        window.lexioOverlay?.openSignIn();
      }
    });
    panelBody.appendChild(frame);

    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const localCompactUrl = window.location.href.replace('pill.html', 'compact.html');
    // Bug #17: the trigger symbol is passed through so compact.html's empty
    // state can name the actually-configured key instead of hardcoding one.
    frame.src = `${localCompactUrl}#desktop=1&theme=${isDark ? 'dark' : 'light'}&trigger=${encodeURIComponent(triggerSymbol)}`;

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (frameReady) {
        frame.executeJavaScript(`
          document.documentElement.classList.toggle('dark-theme', ${e.matches});
          document.documentElement.classList.toggle('light-theme', ${!e.matches});
        `);
      }
    });
  }

  // ── Screen-point capture: pipe the captured screenshot straight into the
  // lookup ── No word is known up front (that's the point — no selection
  // needed, just point and double-tap). compact.html shows a "reading the
  // screen" state until the image arrives, then sends it straight to the
  // backend, which identifies the word AND defines it from the image.
  //
  // Same ordering guard as the old word/context race (see prior history):
  // 'overlay:image-ready' can arrive from main before the initial pending
  // payload has been injected into the webview (frame still loading, or the
  // .capturing pulse in expand() below hasn't finished). Track whether the
  // initial payload has actually been injected, and stash any image that
  // arrives before that until right after — both queues drain through the
  // same funnel (flushPending), so ordering is guaranteed by construction.
  let pendingPayload;    // {imagePending: true} — waiting for the webview to be ready
  let pendingImage;      // {imageBase64} — waiting for pendingPayload to actually be injected first
  let initialInjected = false;

  function injectAndAnalyze(payload) {
    initialInjected = true;
    // Three shapes arrive here: a fresh screen-point capture
    // ({imagePending}), a relookup from the Hub's Recent tab with a cached
    // definition attached ({word, context, data} — B11, renders instantly,
    // no new lookup billed), and a plain relookup with no cache ({word,
    // context} — e.g. a trending-word chip, which is a genuinely new word).
    const script = payload.imagePending ? `
      (function() {
        if (typeof lexioImageInput === 'function') { lexioImageInput(); return; }
        const ta = document.getElementById('paste-area');
        if (ta) ta.value = '';
      })();
    ` : payload.data ? `
      (function() {
        const w = ${JSON.stringify(payload.word)};
        const c = ${JSON.stringify(payload.context)};
        const d = ${JSON.stringify(payload.data)};
        if (typeof lexioDesktopInputCached === 'function') { lexioDesktopInputCached(w, c, d); return; }
        if (typeof lexioDesktopInput === 'function') { lexioDesktopInput(w, c); }
      })();
    ` : `
      (function() {
        const w = ${JSON.stringify(payload.word)};
        const c = ${JSON.stringify(payload.context)};
        if (typeof lexioDesktopInput === 'function') { lexioDesktopInput(w, c); return; }
        const ta = document.getElementById('paste-area');
        if (ta) ta.value = w;
        if (typeof analyze === 'function') analyze();
      })();
    `;
    frame.executeJavaScript(script).catch(() => {});
    // An image for THIS payload may have arrived while we were still
    // waiting to inject the pending state — send it now, right behind
    // (executeJavaScript calls on the same webContents run in the order
    // they're issued, so this ordering is guaranteed).
    if (payload.imagePending && pendingImage) {
      const img = pendingImage; pendingImage = undefined;
      injectImageReady(img);
    }
  }
  function flushPending() {
    if (frameReady && pendingPayload !== undefined) {
      const p = pendingPayload; pendingPayload = undefined;
      injectAndAnalyze(p);
    }
  }

  // ── Streamed-in screenshot, once ScreenCaptureKit resolves (typically
  // well under a second) ──
  function injectImageReady(payload) {
    const script = `
      (function() {
        if (typeof lexioImageReady === 'function') {
          lexioImageReady(${JSON.stringify(payload.imageBase64)}, ${JSON.stringify(payload.imageMime || 'image/png')});
        }
      })();
    `;
    frame.executeJavaScript(script).catch(() => {});
  }
  window.lexioOverlay?.onImageReady((payload) => {
    if (frameReady && initialInjected) injectImageReady(payload);
    else pendingImage = payload;   // drained by injectAndAnalyze, right after the pending state it belongs to
  });

  // ── Auth handoff into the webview ────────────────────────────────
  // compact.html keeps sign-in state in its own partitioned localStorage
  // and listens for a 'lexio-auth' event (same contract the legacy Lexio
  // Mini app uses) — store.js alone can't sign the embedded app in.
  let pendingAuth;          // latest auth payload waiting for the webview
  let hasPendingAuth = false;
  function applyAuth(auth) {
    if (!frameReady) { pendingAuth = auth; hasPendingAuth = true; return; }
    const script = auth ? `
      localStorage.setItem('lexio_token', ${JSON.stringify(auth.token)});
      ${auth.user ? `localStorage.setItem('lexio_user', ${JSON.stringify(JSON.stringify(auth.user))});` : ''}
      window.dispatchEvent(new CustomEvent('lexio-auth', { detail: { token: ${JSON.stringify(auth.token)}, user: ${auth.user ? JSON.stringify(auth.user) : 'null'} } }));
    ` : `
      localStorage.removeItem('lexio_token');
      localStorage.removeItem('lexio_user');
      location.reload();
    `;
    frame.executeJavaScript(script).catch(() => {});
  }
  function flushPendingAuth() {
    if (frameReady && hasPendingAuth) {
      const a = pendingAuth; pendingAuth = undefined; hasPendingAuth = false;
      applyAuth(a);
    }
  }
  window.lexioOverlay?.onAuth((payload) => applyAuth(payload));

  // BUG #7 FIX: this timer used to fire unconditionally 250ms after expand()
  // was called, even if the user had already collapsed (mouse-left, Esc,
  // clicked away) during that window — re-adding .expanded right after
  // collapse() had just removed it, sometimes after main-overlay.js had
  // already started shrinking the OS window back down, so the full panel
  // briefly rendered clipped inside the tiny 44x42 pill bounds. Tracking the
  // timer and clearing it on collapse() closes that race.
  let expandTimer = null;

  function expand(payload) {
    ensureFrame();
    if (payload?.word || payload?.imagePending) {
      // A brand new lookup starts clean — any context still waiting on a
      // previous, never-fully-injected lookup must not leak into this one.
      initialInjected = false;
      pendingContext = undefined;
      pill.classList.add('capturing');
      clearTimeout(expandTimer);
      expandTimer = setTimeout(() => {
        expandTimer = null;
        pill.classList.remove('capturing');
        body.classList.add('expanded');
        pendingPayload = payload; flushPending();
      }, 250);
    } else {
      body.classList.add('expanded');
      // Bug #10: nothing was captured (no selection, or Accessibility not
      // granted yet) — without this, the panel re-opened showing whatever
      // was left over from the LAST lookup (a stuck "Reading context…", or
      // someone else's definition from an hour ago).
      if (frameReady) frame.executeJavaScript(`if (typeof lexioReset === 'function') lexioReset();`).catch(() => {});
    }
  }
  function collapse() {
    clearTimeout(expandTimer);
    expandTimer = null;
    pill.classList.remove('capturing');
    body.classList.remove('expanded');
    setPinned(false);
  }

  // Hover is purely cosmetic now (see CSS .pill:hover). 
  // Clicking the pill expands it.
  // Cmd/Ctrl + Drag allows repositioning the window.
  pill.addEventListener('mousedown', (e) => {
    if (e.metaKey || e.ctrlKey) {
      e.preventDefault();
      window.lexioOverlay?.startDrag();
    }
  });
  pill.addEventListener('click', (e) => {
    if (!e.metaKey && !e.ctrlKey) {
      window.lexioOverlay?.requestExpand();
    }
  });
  close.addEventListener('click', () => window.lexioOverlay?.requestCollapse());
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') window.lexioOverlay?.requestCollapse();
  });

  // Moving the mouse fully out of the window (not just between the pill and
  // the panel — mouseleave on <body> only fires when the cursor actually
  // crosses the window's own edge) collapses back to the pill, mirroring
  // hover-to-expand. A short debounce (200ms), cancelled on re-entry, stops
  // a momentary dip across the edge — e.g. aiming for the close button —
  // from closing the panel out from under the user.
  let leaveTimer = null;
  document.body.addEventListener('mouseleave', () => {
    if (pinned) return;   // pinned: stay open even once the cursor leaves
    leaveTimer = setTimeout(() => window.lexioOverlay?.requestCollapse(), 200);
  });
  document.body.addEventListener('mouseenter', () => {
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
  });

  // Main process drives the actual state (it owns the window size) and,
  // when it captured a selection (Phase 2), passes {word, context} along.
  window.lexioOverlay?.onExpand((payload) => expand(payload));
  window.lexioOverlay?.onCollapse(() => collapse());

  window.lexioOverlay?.getTriggerSymbol().then((sym) => {
    if (sym) {
      triggerSymbol = sym;
      pill.title = `Click: open panel · Double-tap ${sym}: define the word at your pointer`;
    }
  });
</script>
</body>
</html>
