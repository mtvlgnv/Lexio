# Lexio — Nginx server block
# Place this file at /etc/nginx/sites-available/lexio
# then: sudo ln -s /etc/nginx/sites-available/lexio /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;   # ← replace before deploying

    # Let Certbot manage redirects after SSL is set up;
    # Certbot will modify this block automatically.

    # ── Upload limit (for OCR image uploads) ──────────────────
    client_max_body_size 15m;

    # ── Static frontend ────────────────────────────────────────
    root /var/www/lexio/static;
    index index.html;

    # ── Glossary, works, & sitemap (dynamic routes — must come before static catch-all)
    location ^~ /glossary {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /works {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /sitemap.xml {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Stripe webhook: needs the raw, unbuffered body for HMAC verification.
    # Match BEFORE the regex API proxy so it takes precedence.
    location = /stripe/webhook {
        proxy_pass         http://127.0.0.1:8000/stripe/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      30s;
    }

    # ── API proxy ─────────────────────────────────────────────
    # Routes that hit the FastAPI backend (everything else falls back to the
    # static frontend via try_files above).
    location ~ ^/(define|fetch-text|auth|wordbank|stats|api|admin|ocr|payhip|stripe|pro|privacy|credits|glossary|works|sitemap.xml) {
        proxy_pass         http://127.0.0.1:8000$request_uri;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;   # /fetch-text hits external sites
        proxy_read_timeout    60s;

        proxy_buffering off;
    }

    # ── Security headers ────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
