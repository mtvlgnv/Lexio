<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-label="Lexio promotional card">
  <defs>
    <radialGradient id="glow" cx="70%" cy="62%" r="62%">
      <stop offset="0%" stop-color="#f1ad5f" stop-opacity=".95"/>
      <stop offset="38%" stop-color="#8c4c72" stop-opacity=".72"/>
      <stop offset="72%" stop-color="#2b1938" stop-opacity=".84"/>
      <stop offset="100%" stop-color="#14100d"/>
    </radialGradient>
    <linearGradient id="warmPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a321f"/>
      <stop offset="48%" stop-color="#7a452d"/>
      <stop offset="100%" stop-color="#4c2838"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6a044"/>
      <stop offset="100%" stop-color="#df7426"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#050403" flood-opacity=".42"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#050403" flood-opacity=".34"/>
    </filter>
    <clipPath id="browserClip">
      <rect x="550" y="138" width="594" height="442" rx="24"/>
    </clipPath>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"DM Sans","Inter","Segoe UI",sans-serif}
      .serif{font-family:Georgia,"Times New Roman",serif}
      .smallcaps{font-family:-apple-system,BlinkMacSystemFont,"DM Sans","Inter","Segoe UI",sans-serif;font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
    </style>
  </defs>

  <rect width="1280" height="800" fill="#15110e"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <path d="M0 500 C170 420 270 470 395 505 C560 550 690 435 837 390 C1000 340 1138 380 1280 330 L1280 800 L0 800 Z"
        fill="#bf9352" opacity=".55"/>
  <path d="M0 565 C170 480 318 555 472 575 C690 605 796 472 1000 452 C1120 440 1200 462 1280 410 L1280 800 L0 800 Z"
        fill="#2b1832" opacity=".5"/>

  <g transform="translate(72 92)">
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="46" height="46" rx="12" fill="url(#orange)"/>
      <text x="23" y="31" class="serif" text-anchor="middle" fill="#fff" font-size="25" font-weight="700">L</text>
    </g>
    <text x="62" y="31" class="serif" fill="#fff4e7" font-size="29" font-weight="700">Lexio</text>
  </g>

  <g transform="translate(72 216)">
    <text class="serif" fill="#fff7ee" font-size="66" font-weight="700">
      <tspan x="0" y="0">Read deeper.</tspan>
      <tspan x="0" y="75">Understand</tspan>
      <tspan x="0" y="150" fill="#ec842b" font-style="italic">everything.</tspan>
    </text>
    <text x="0" y="210" class="sans" fill="#d8cbc2" font-size="22" font-weight="500">
      <tspan x="0" dy="0">Highlight any word or phrase.</tspan>
      <tspan x="0" dy="34">Get its meaning in the exact sentence.</tspan>
    </text>
    <g transform="translate(0 296)">
      <rect width="244" height="58" rx="12" fill="url(#orange)"/>
      <text x="122" y="37" text-anchor="middle" class="sans" fill="#fff" font-size="19" font-weight="800">Add to Chrome — free</text>
    </g>
    <text x="0" y="402" class="smallcaps" fill="#df7d2c">Contextual definitions for serious readers</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="526" y="104" width="642" height="514" rx="28" fill="url(#warmPanel)" opacity=".96"/>
    <rect x="526.5" y="104.5" width="641" height="513" rx="27.5" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
  </g>

  <g clip-path="url(#browserClip)">
    <rect x="550" y="138" width="594" height="442" rx="24" fill="#17120f"/>
    <rect x="550" y="138" width="594" height="52" fill="#211914"/>
    <circle cx="578" cy="164" r="6" fill="#f36e55"/>
    <circle cx="600" cy="164" r="6" fill="#f5bd4f"/>
    <circle cx="622" cy="164" r="6" fill="#62c554"/>
    <rect x="666" y="151" width="322" height="26" rx="13" fill="#14100e" stroke="#3d3028"/>
    <text x="827" y="169" text-anchor="middle" class="sans" fill="#b9aca1" font-size="12" font-weight="700">theparisreview.org/essay</text>

    <rect x="578" y="228" width="508" height="188" rx="16" fill="#100d0b" stroke="#3b2d25"/>
    <text x="610" y="278" class="serif" fill="#f5ecdf" font-size="26" font-weight="700">
      <tspan x="610" dy="0">The novel’s </tspan>
      <tspan fill="#f28a2c">labyrinthine</tspan>
      <tspan> plot left</tspan>
      <tspan x="610" dy="42">readers spellbound, every twist</tspan>
      <tspan x="610" dy="42">deepening the ambiguity.</tspan>
    </text>

    <g filter="url(#smallShadow)">
      <rect x="652" y="350" width="404" height="188" rx="18" fill="#fbf7ef"/>
      <rect x="652.5" y="350.5" width="403" height="187" rx="17.5" fill="none" stroke="#eadfce"/>
      <text x="684" y="390" class="serif" fill="#1e1814" font-size="28" font-weight="700">labyrinthine</text>
      <rect x="876" y="367" width="74" height="24" rx="12" fill="#f7eadc"/>
      <text x="913" y="384" text-anchor="middle" class="sans" fill="#cc6e24" font-size="11" font-weight="800">adjective</text>
      <text x="684" y="424" class="sans" fill="#7f7168" font-size="14" font-style="italic">/ˌlæb.əˈrɪn.θaɪn/</text>
      <text x="684" y="462" class="sans" fill="#2e2721" font-size="17" font-weight="600">
        <tspan x="684" dy="0">In this sentence, it means intricate and</tspan>
        <tspan x="684" dy="27">difficult to follow, like a maze.</tspan>
      </text>
      <line x1="684" y1="496" x2="1024" y2="496" stroke="#eadfce"/>
      <text x="684" y="522" class="sans" fill="#936a4e" font-size="13" font-weight="800" letter-spacing=".12em">WHY THIS WORD</text>
      <text x="830" y="522" class="sans" fill="#5c5048" font-size="14">Suggests beauty, suspense, and complexity.</text>
    </g>
  </g>

  <g transform="translate(746 658)">
    <text text-anchor="middle" class="sans" fill="#ede3d6" font-size="22" font-weight="800">
      Not every meaning. The right meaning.
    </text>
    <text x="0" y="34" text-anchor="middle" class="sans" fill="#c9b6a4" font-size="15" font-weight="600">
      AI-powered definitions that understand context.
    </text>
  </g>
</svg>
