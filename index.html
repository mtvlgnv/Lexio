<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexio — Contextual Definitions</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f4f6;
      --surface:     #ffffff;
      --border:      #e2e2e8;
      --accent:      #4f46e5;
      --accent-dk:   #3730a3;
      --accent-lt:   #ede9fe;
      --text:        #18181b;
      --muted:       #71717a;
      --token-hover: #ede9fe;
      --token-active:#c7d2fe;
      --radius:      12px;
      --header-h:    56px;
      --panel-pad:   24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .brand {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .brand-dot { color: var(--text); }

    .tagline {
      font-size: .8rem;
      color: var(--muted);
      border-left: 1px solid var(--border);
      padding-left: 12px;
      line-height: 1;
    }

    /* ── Main layout ───────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      gap: 0;
      padding: 20px;
      height: calc(100vh - var(--header-h));
    }

    /* ── Panels ────────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-left  { flex: 1; margin-right: 10px; }
    .panel-right { width: 380px; flex-shrink: 0; }

    .panel-header {
      padding: 14px var(--panel-pad) 0;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Textarea ──────────────────────────────────────────── */
    #input-area {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    #input-text {
      flex: 1;
      width: 100%;
      padding: 16px var(--panel-pad);
      border: none;
      outline: none;
      resize: none;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text);
      background: transparent;
      font-family: inherit;
    }

    #input-text::placeholder { color: #b0b0ba; }

    /* ── Token view ────────────────────────────────────────── */
    #token-view {
      flex: 1;
      padding: 16px var(--panel-pad);
      font-size: 1rem;
      line-height: 1.9;
      overflow-y: auto;
      word-break: break-word;
    }

    #token-view.hidden,
    #input-text.hidden { display: none; }

    .word-token {
      display: inline;
      border-radius: 3px;
      padding: 1px 1px;
      cursor: pointer;
      transition: background .12s, color .12s;
    }

    .word-token:hover  { background: var(--token-hover); }
    .word-token.active { background: var(--token-active); color: var(--accent-dk); }

    /* ── Panel footer (buttons) ────────────────────────────── */
    .panel-footer {
      padding: 12px var(--panel-pad);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 500;
      padding: 9px 22px;
      transition: background .15s, opacity .15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover  { background: var(--accent-dk); }
    .btn-primary:active { opacity: .85; }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--bg); color: var(--text); }

    button.hidden { display: none !important; }

    /* ── Right panel — placeholder ─────────────────────────── */
    #def-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--panel-pad);
      text-align: center;
      gap: 12px;
      color: var(--muted);
    }

    .placeholder-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-lt);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder-icon svg { color: var(--accent); }

    #def-placeholder p {
      font-size: .9rem;
      max-width: 220px;
      line-height: 1.55;
    }

    /* ── Right panel — loading ─────────────────────────────── */
    #def-loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      font-size: .9rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Right panel — result ──────────────────────────────── */
    #def-result {
      flex: 1;
      padding: var(--panel-pad);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .def-word-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .def-word {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.5px;
      color: var(--text);
    }

    .pos-badge {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      background: var(--accent-lt);
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 20px;
    }

    .def-section { display: flex; flex-direction: column; gap: 6px; }

    .def-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .def-text {
      font-size: .95rem;
      line-height: 1.65;
      color: var(--text);
    }

    .def-why {
      background: var(--bg);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
      font-size: .9rem;
      line-height: 1.6;
      color: #3f3f46;
    }

    /* ── Error banner ──────────────────────────────────────── */
    #error-banner {
      margin: 12px var(--panel-pad) 0;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .85rem;
      line-height: 1.5;
    }

    #error-banner.hidden { display: none; }

    /* ── Utility ───────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 720px) {
      main { flex-direction: column; height: auto; }
      .panel-left  { margin-right: 0; margin-bottom: 10px; min-height: 280px; }
      .panel-right { width: 100%; min-height: 260px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <span class="brand">Lexio<span class="brand-dot">.</span></span>
  <span class="tagline">Contextual word definitions</span>
</header>

<!-- ── Main ────────────────────────────────────────────────── -->
<main>

  <!-- Left panel -->
  <div class="panel panel-left">
    <div class="panel-header">Text</div>
    <div id="error-banner" class="hidden"></div>

    <div id="input-area">
      <textarea
        id="input-text"
        placeholder="Paste any text here — an article, a quote, a paragraph — then click Analyze."
        spellcheck="false"
      ></textarea>
      <div id="token-view" class="hidden" aria-label="Tokenized text — click any word"></div>
    </div>

    <div class="panel-footer">
      <button id="edit-btn" class="btn-secondary hidden" onclick="resetToEdit()">Edit text</button>
      <button id="analyze-btn" class="btn-primary" onclick="analyze()">Analyze</button>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel panel-right">

    <div id="def-placeholder">
      <div class="placeholder-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <p>Analyze your text, then tap any word to see its contextual definition.</p>
    </div>

    <div id="def-loading" class="hidden">
      <div class="spinner"></div>
      <span>Thinking…</span>
    </div>

    <div id="def-result" class="hidden">
      <div class="def-word-row">
        <span id="def-word" class="def-word"></span>
        <span id="def-pos"  class="pos-badge"></span>
      </div>
      <div class="def-section">
        <span class="def-label">In this context</span>
        <p id="def-contextual" class="def-text"></p>
      </div>
      <div class="def-section">
        <span class="def-label">Why this word?</span>
        <p id="def-why" class="def-why"></p>
      </div>
    </div>

  </div>
</main>

<script>
  /* ── State ──────────────────────────────────────────────── */
  let currentContext = "";
  let activeToken    = null;

  /* ── Analyze ────────────────────────────────────────────── */
  function analyze() {
    const raw = document.getElementById("input-text").value.trim();
    if (!raw) return;

    currentContext = raw;
    hideError();
    renderTokens(raw);

    document.getElementById("input-text").classList.add("hidden");
    document.getElementById("token-view").classList.remove("hidden");
    document.getElementById("edit-btn").classList.remove("hidden");
    document.getElementById("analyze-btn").classList.add("hidden");
    showPlaceholder();
  }

  /* ── Reset to edit ──────────────────────────────────────── */
  function resetToEdit() {
    document.getElementById("token-view").classList.add("hidden");
    document.getElementById("input-text").classList.remove("hidden");
    document.getElementById("edit-btn").classList.add("hidden");
    document.getElementById("analyze-btn").classList.remove("hidden");
    activeToken = null;
    showPlaceholder();
    hideError();
  }

  /* ── Tokenize & render ──────────────────────────────────── */
  function renderTokens(text) {
    const container = document.getElementById("token-view");
    container.innerHTML = "";

    // Split into alternating [non-word, word, non-word, word …]
    const parts = text.split(/([A-Za-z\u00C0-\u024F''\-]+)/);

    parts.forEach((part, i) => {
      if (i % 2 === 1) {
        // Word token
        const span = document.createElement("span");
        span.className    = "word-token";
        span.textContent  = part;
        span.setAttribute("role", "button");
        span.setAttribute("tabindex", "0");
        span.addEventListener("click",  () => handleWordClick(span, part));
        span.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") handleWordClick(span, part);
        });
        container.appendChild(span);
      } else {
        // Non-word (spaces, punctuation, numbers)
        container.appendChild(document.createTextNode(part));
      }
    });
  }

  /* ── Word click ─────────────────────────────────────────── */
  function handleWordClick(span, word) {
    // Update active token highlight
    if (activeToken) activeToken.classList.remove("active");
    activeToken = span;
    span.classList.add("active");

    fetchDefinition(word, currentContext);
  }

  /* ── Fetch definition ───────────────────────────────────── */
  async function fetchDefinition(word, context) {
    showLoading();
    hideError();

    try {
      const resp = await fetch("/define", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ word, context }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }

      const data = await resp.json();
      showResult(word, data);
    } catch (err) {
      showPlaceholder();
      showError(`Could not fetch definition: ${err.message}`);
    }
  }

  /* ── Panel state helpers ────────────────────────────────── */
  function showPlaceholder() {
    document.getElementById("def-placeholder").classList.remove("hidden");
    document.getElementById("def-loading").classList.add("hidden");
    document.getElementById("def-result").classList.add("hidden");
  }

  function showLoading() {
    document.getElementById("def-placeholder").classList.add("hidden");
    document.getElementById("def-loading").classList.remove("hidden");
    document.getElementById("def-result").classList.add("hidden");
  }

  function showResult(word, data) {
    document.getElementById("def-placeholder").classList.add("hidden");
    document.getElementById("def-loading").classList.add("hidden");
    document.getElementById("def-result").classList.remove("hidden");

    document.getElementById("def-word").textContent       = word;
    document.getElementById("def-pos").textContent        = data.pos  || "";
    document.getElementById("def-contextual").textContent = data.contextual || "";
    document.getElementById("def-why").textContent        = data.why  || "";
  }

  function showError(msg) {
    const b = document.getElementById("error-banner");
    b.textContent = msg;
    b.classList.remove("hidden");
  }

  function hideError() {
    document.getElementById("error-banner").classList.add("hidden");
  }

  /* ── Keyboard shortcut: Ctrl/Cmd+Enter to analyze ──────── */
  document.getElementById("input-text").addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") analyze();
  });
</script>
</body>
</html>
